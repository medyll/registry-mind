project_name: registry-mind
phase: development
progress: 75
active_role: Architect
last_updated: "2026-04-27"
chain_protocol:
  next_action: "Planifier Sprint 4 — on-device LLM, refactor RegistryIngestor, ExportConnector interface"
  next_command: bmad-continue
  next_role: Developer

marketing: >-
  Android cognitive sensor with fully sovereign on-device AI processing — no cloud dependency.
  Surpasses OEM MindSpace apps by enriching captured content locally and exporting to any platform.

product: >-
  Local-first capture app (Oppo Find X9): Snap Key → OCR → on-device LLM (MediaPipe/Gemma)
  → enriched local storage → agnostic export layer. No remote LLM calls. NPU-accelerated.

far_vision: >-
  Universal second-brain sensor: local AI enrichment pipeline, pluggable export connectors
  (OpenClaw, API, filesystem, cloud), multi-device sync, continuous thought streaming.

architecture_pivot:
  date: "2026-04-27"
  summary: >-
    Remote LLM processing (OpenClaw server-side) cancelled. All AI enrichment moves on-device
    via MediaPipe + Gemma 2B-IT (NPU-accelerated). ClawConnector demoted from primary flow
    to one of many future ExportConnector implementations. Architecture becomes local-first,
    export-agnostic.
  old_flow: "capture → OCR → send raw packet → remote LLM → sync back"
  new_flow: "capture → OCR → LocalLlm.process() → local DB → [optional export]"
  deprecated_as_primary:
    - ClawConnector (sendPacket)
    - SyncWorker (réseau comme flow principal)
    - RegistryPacket.aiGuess (rempli localement, plus renvoyé à serveur)

detected:
  languages: [Kotlin]
  platform: Android (minSdk 24, targetSdk 35)
  target_device: Oppo Find X9 (Snapdragon NPU — Hexagon)
  llm_backend: MediaPipe LLM Inference API (Gemma 2B-IT Q4 / Phi-3-mini INT4)

